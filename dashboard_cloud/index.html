<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xolotl Monitor</title>
  <style>
    :root{
      --bg:#fff5f7;
      --card:#ffffffcc;
      --line:#ffd6e1;
      --text:#2b2130;
      --muted:#6c5a69;
      --pink:#ff8fb3;
      --pink2:#ffb3ca;
      --good:#2aa876;
      --warn:#ff9f1a;
      --bad:#ff4d6d;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 0%, #ffe4ee 0%, var(--bg) 55%, #f7f7ff 100%);
    }
    .wrap{max-width:980px;margin:0 auto;padding:18px;}
    .top{
      display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;
      padding:14px 16px; border:1px solid var(--line); border-radius:18px;
      background: linear-gradient(90deg,#ffe8f0, #fff);
      box-shadow: 0 10px 30px rgba(255,143,179,.10);
    }
    .brand{display:flex; gap:12px; align-items:center}
    .logo{
      width:52px;height:52px;border-radius:18px;
      background: linear-gradient(180deg,var(--pink2),#ffd6e1);
      border:1px solid #ffb9cc;
      display:grid;place-items:center;
      position:relative; overflow:hidden;
    }
    .logo:before{
      content:"";
      position:absolute; inset:-10px;
      background: radial-gradient(circle at 30% 30%, #ffffffaa, transparent 60%);
    }
    .logo span{font-weight:1000;color:#7a1d3e; position:relative}
    .title{font-weight:1000;font-size:18px}
    .sub{color:var(--muted); font-size:13px}
    .pill{
      border:1px solid var(--line); background:#fff; border-radius:999px; padding:10px 12px;
      display:flex; gap:10px; align-items:center; font-size:14px;
    }
    .dot{width:10px;height:10px;border-radius:99px;background:#bbb}
    .dot.ok{background:var(--good)}
    .dot.bad{background:var(--bad)}
    .grid{display:grid; grid-template-columns:1.1fr .9fr; gap:14px; margin-top:14px}
    @media (max-width:860px){ .grid{grid-template-columns:1fr} }
    .card{
      background:var(--card); border:1px solid var(--line); border-radius:18px;
      padding:14px 14px;
      box-shadow: 0 10px 30px rgba(255,143,179,.10);
    }
    .hero{
      display:flex; gap:14px; align-items:center; flex-wrap:wrap;
    }
    .axo{
      width:160px; height:120px; border-radius:22px;
      border:1px solid var(--line);
      background: radial-gradient(circle at 30% 20%, #fff, #ffe6ee 55%, #ffd0df 100%);
      position:relative; overflow:hidden;
      flex: 0 0 auto;
    }
    /* “carita” ajolote simple */
    .axo .eye{width:10px;height:10px;border-radius:99px;background:#3a2230; position:absolute; top:52px}
    .axo .eye.l{left:58px}
    .axo .eye.r{left:92px}
    .axo .mouth{
      position:absolute; left:72px; top:70px; width:36px; height:18px;
      border-bottom:3px solid #3a2230; border-radius:0 0 40px 40px;
      opacity:.65;
    }
    .axo .gill{
      position:absolute; top:40px; width:22px; height:50px;
      background: linear-gradient(180deg,#ff9bbd,#ffd0df);
      border:1px solid #ffb9cc;
      border-radius:18px;
      transform: rotate(10deg);
      opacity:.9;
    }
    .axo .gill.l{left:18px; transform: rotate(-18deg)}
    .axo .gill.r{right:18px; transform: rotate(18deg)}
    .kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:12px}
    @media (max-width:860px){ .kpis{grid-template-columns:1fr} }
    .kpi .label{color:var(--muted); font-size:13px}
    .kpi .val{font-size:36px; font-weight:1000; margin-top:6px}
    .badge{
      display:inline-flex; align-items:center; gap:8px; border-radius:999px;
      padding:8px 10px; border:1px solid var(--line); background:#fff; font-weight:900;
    }
    .b-ok{color:var(--good)}
    .b-warn{color:var(--warn)}
    .b-bad{color:var(--bad)}
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    button{
      border:1px solid var(--line);
      background:#fff; padding:12px 14px; border-radius:14px;
      font-weight:1000; cursor:pointer;
    }
    button.primary{
      background: linear-gradient(180deg,var(--pink2),var(--pink));
      border-color:#ff7aa6; color:#3b1022;
    }
    .hint{color:var(--muted); font-size:13px; margin-top:8px}
    input{
      width:100%; padding:12px 12px; border-radius:14px;
      border:1px solid var(--line);
      font-size:16px; background:#fff;
    }
    .inputs{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px}
    @media (max-width:860px){ .inputs{grid-template-columns:1fr} }
    .mini{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo"><span>XO</span></div>
        <div>
          <div class="title">Monitor del ajolote</div>
        </div>
      </div>
      <div class="pill">
        <span class="dot" id="dot"></span>
        <b id="connText">desconectado</b>
        <span class="sub" id="lastText">• sin datos</span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="hero">
          <div class="axo" aria-hidden="true">
            <div class="gill l"></div>
            <div class="gill r"></div>
            <div class="eye l"></div>
            <div class="eye r"></div>
            <div class="mouth"></div>
          </div>
          <div style="min-width:240px; flex:1">
            <div style="font-weight:1000;font-size:18px">Tiempo real</div>
            <div class="row">
              <span class="badge" id="tempBadge">Temp: sin dato</span>
              <span class="badge">Topic: <span class="mini">axolotl/tank1/telemetry</span></span>
            </div>
          </div>
        </div>

        <div class="kpis">
          <div class="kpi">
            <div class="label">Temperatura agua (°C)</div>
            <div class="val"><span id="tWater">--</span></div>
            <div class="hint">Ideal 16–18 • Cuidado &gt;20</div>
          </div>
          <div class="kpi">
            <div class="label">Estado</div>
            <div class="val" style="font-size:26px;margin-top:12px" id="stateText">esperando datos…</div>
            <div class="hint">Basado en umbrales</div>
          </div>
          <div class="kpi">
            <div class="label">Último mensaje</div>
            <div class="val" style="font-size:26px;margin-top:12px"><span id="ago">--</span></div>
            <div class="hint">segundos</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:1000;font-size:18px">Umbrales</div>


        <div class="inputs">
          <div>
            <div class="sub">Warn</div>
            <input id="warn" type="number" step="0.1" value="18.5" />
          </div>
          <div>
            <div class="sub">High</div>
            <input id="high" type="number" step="0.1" value="19.5" />
          </div>
          <div>
            <div class="sub">Emergency</div>
            <input id="emergency" type="number" step="0.1" value="20.5" />
          </div>
        </div>

        <div class="row">
          <button class="primary" id="apply">Aplicar</button>
          <button id="reset">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    // ==== HiveMQ Cloud WebSocket TLS ====
    const HOST = "8198d0c0e5da4d7fb736a4deaeed9a8e.s1.eu.hivemq.cloud";
    const USER = "Mauri1249";
    const PASSWORD = "Mauri2002"; // <-- cambia esto

    const WS_URL = `wss://${HOST}:8884/mqtt`;

    const TOPIC_TELE = "axolotl/tank1/telemetry";

    const dot = document.getElementById("dot");
    const connText = document.getElementById("connText");
    const lastText = document.getElementById("lastText");
    const tWaterEl = document.getElementById("tWater");
    const tempBadge = document.getElementById("tempBadge");
    const stateText = document.getElementById("stateText");
    const agoEl = document.getElementById("ago");

    const warnEl = document.getElementById("warn");
    const highEl = document.getElementById("high");
    const emergencyEl = document.getElementById("emergency");

    let lastSeen = null;
    let warn = Number(warnEl.value);
    let high = Number(highEl.value);
    let emergency = Number(emergencyEl.value);

    function badgeForTemp(t){
      if (!Number.isFinite(t)) return ["b-bad","Temp: sin dato","esperando datos…"];
      if (t >= emergency) return ["b-bad","Temp: emergencia","emergencia"];
      if (t >= high)      return ["b-warn","Temp: alta","alta"];
      if (t >= warn)      return ["b-warn","Temp: cuidado","cuidado"];
      return ["b-ok","Temp: ok","ok"];
    }

    function tick(){
      if (!lastSeen) { lastText.textContent = "• sin datos"; agoEl.textContent = "--"; return; }
      const s = Math.round((Date.now()-lastSeen)/1000);
      lastText.textContent = `• último: ${s}s`;
      agoEl.textContent = String(s);
    }
    setInterval(tick, 1000);

    const client = mqtt.connect(WS_URL, {
      username: USER,
      password: PASSWORD,
      keepalive: 30,
      reconnectPeriod: 1200,
      connectTimeout: 6000,
      clean: true,
    });

    client.on("connect", () => {
      dot.className = "dot ok";
      connText.textContent = "conectado";
      client.subscribe([TOPIC_TELE]);
    });

    client.on("reconnect", () => {
      dot.className = "dot";
      connText.textContent = "reconectando…";
    });

    client.on("close", () => {
      dot.className = "dot bad";
      connText.textContent = "desconectado";
    });

    client.on("error", (err) => {
      console.log("MQTT error:", err?.message || err);
    });

    client.on("message", (topic, payload) => {
      lastSeen = Date.now();

      try {
        const msg = JSON.parse(payload.toString());
        const t = Number(msg.tWater);
        tWaterEl.textContent = Number.isFinite(t) ? t.toFixed(2) : "--";

        const [cls, text, st] = badgeForTemp(t);
        tempBadge.className = "badge " + cls;
        tempBadge.textContent = text;
        stateText.textContent = st;
      } catch(e) {
        // ignora si llega algo raro
      }
    });

    document.getElementById("apply").onclick = () => {
      warn = Number(warnEl.value);
      high = Number(highEl.value);
      emergency = Number(emergencyEl.value);
    };

    document.getElementById("reset").onclick = () => {
      warnEl.value = "18.5";
      highEl.value = "19.5";
      emergencyEl.value = "20.5";
      warn = 18.5; high = 19.5; emergency = 20.5;
    };
  </script>
</body>
</html>
